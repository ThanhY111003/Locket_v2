spring.application.name=locket-finance

# ===== PostgreSQL Database =====
# Gia tri duoc doc tu file .env (xem .env.example)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== JWT =====
# Dung it nhat 32 ky tu de dam bao bao mat HS256
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===== Cloudinary =====
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ===== Google Gemini API =====
# Lay API key tai: https://aistudio.google.com/app/apikey
# De trong neu chua co -- he thong se tu dong bo qua buoc phan loai AI
gemini.api-key=${GEMINI_API_KEY:}

# ===== Multipart File Upload =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:15MB}

# ===== Local File Storage (fallback khi Cloudinary chưa cấu hình) =====
upload.local-dir=uploads
server.base-url=${SERVER_BASE_URL:http://localhost:8080}

# ===== SpringDoc / Swagger =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===== Logging =====
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ===== OAuth2 =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
